name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-amd64
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-arm64
            ext: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: macos-amd64
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: macos-arm64
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: windows-amd64
            ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hdcd-telegram dist/
          cp target/${{ matrix.target }}/release/hdcd-router dist/
          cd dist && tar czf ../hdcd-telegram-${{ github.ref_name }}-${{ matrix.artifact }}.tar.gz *

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/hdcd-telegram.exe dist/
          Copy-Item target/${{ matrix.target }}/release/hdcd-router.exe dist/
          Compress-Archive -Path dist/* -DestinationPath hdcd-telegram-${{ github.ref_name }}-${{ matrix.artifact }}.zip

      - name: Generate SHA256 checksum (unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 hdcd-telegram-${{ github.ref_name }}-${{ matrix.artifact }}.tar.gz > hdcd-telegram-${{ github.ref_name }}-${{ matrix.artifact }}.tar.gz.sha256

      - name: Generate SHA256 checksum (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 "hdcd-telegram-${{ github.ref_name }}-${{ matrix.artifact }}.zip").Hash.ToLower()
          "$hash  hdcd-telegram-${{ github.ref_name }}-${{ matrix.artifact }}.zip" | Out-File -Encoding ASCII "hdcd-telegram-${{ github.ref_name }}-${{ matrix.artifact }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            hdcd-telegram-${{ github.ref_name }}-${{ matrix.artifact }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate combined checksums file
        run: |
          cat artifacts/**/*.sha256 > artifacts/SHA256SUMS.txt
          cat artifacts/SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/SHA256SUMS.txt
          body: |
            ## Download

            | Platform | Architecture | Download |
            |---|---|---|
            | Linux | x86_64 | `hdcd-telegram-${{ github.ref_name }}-linux-amd64.tar.gz` |
            | Linux | aarch64 (ARM64) | `hdcd-telegram-${{ github.ref_name }}-linux-arm64.tar.gz` |
            | macOS | Intel | `hdcd-telegram-${{ github.ref_name }}-macos-amd64.tar.gz` |
            | macOS | Apple Silicon | `hdcd-telegram-${{ github.ref_name }}-macos-arm64.tar.gz` |
            | Windows | x86_64 | `hdcd-telegram-${{ github.ref_name }}-windows-amd64.zip` |

            ## Verify integrity

            Each archive has a matching `.sha256` file. A combined `SHA256SUMS.txt` is also attached.

            ```bash
            # Verify a single file
            shasum -a 256 -c hdcd-telegram-${{ github.ref_name }}-macos-arm64.tar.gz.sha256

            # Or verify all at once
            shasum -a 256 -c SHA256SUMS.txt
            ```

            ## macOS: remove quarantine

            macOS Gatekeeper blocks unsigned binaries downloaded from the internet.
            After extracting, run:

            ```bash
            xattr -d com.apple.quarantine ./hdcd-telegram
            ```

            ## Included binaries

            Each archive contains two binaries:
            - **hdcd-telegram** — MCP server (1:1 standalone mode, or `--router` for multi-session)
            - **hdcd-router** — multi-session router that creates Telegram forum topics per session

            ## Quick start (standalone)

            ```bash
            tar xzf hdcd-telegram-${{ github.ref_name }}-<platform>.tar.gz
            # Add to .mcp.json, then:
            claude --dangerously-load-development-channels server:telegram
            ```

            ## Quick start (router)

            ```bash
            # 1. Configure router
            mkdir -p ~/.claude/channels/telegram-router
            cat > ~/.claude/channels/telegram-router/config.json << 'EOF'
            {"bot_token":"YOUR_TOKEN","supergroup_id":"YOUR_GROUP_ID","allowed_users":["YOUR_USER_ID"]}
            EOF

            # 2. Start router (once)
            ./hdcd-router

            # 3. Launch Claude Code sessions with --router flag
            claude --dangerously-load-development-channels server:telegram
            ```

            See [README](https://github.com/gohyperdev/hdcd-telegram#router-mode-multi-session) for full setup.
